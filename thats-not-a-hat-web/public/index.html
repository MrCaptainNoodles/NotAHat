<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaslight Express</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Gaslight Express</h1>
            <div id="status-message" class="status-message">Loading game...</div>
        </header>

        <div id="lobby-area" class="lobby-area">
            <h2>Lobby</h2>
            
            <div id="setup-controls">
                <input type="text" id="player-name-input" placeholder="Enter Player Name" autocomplete="off">
                <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                    <button id="host-btn">Host Game</button>
                    <button id="join-btn" class="secondary">Join Room</button>
                </div>
            </div>

            <div id="room-info" class="hidden">
                <h3 id="room-code-display" style="color: #0fbcf9;"></h3>
                <p style="font-size: 0.9rem; margin-bottom: 15px;">Share the URL with friends so they can join!</p>
                <div id="lobby-player-list" class="lobby-player-list"></div>
                <button id="start-game-btn" class="hidden" style="margin-top: 15px;">Start Game</button>
            </div>
        </div>

        <main id="play-area" class="play-area hidden">
            
            <div id="game-info-hud" class="hidden">
                <h2 id="round-display">Round 1</h2>
            </div>
            
            <div id="desktop-leaderboard" class="hidden">
                <h3>Scoreboard</h3>
                <div id="leaderboard-list"></div>
            </div>

            <div id="game-table" class="game-table">
            </div>

            <div id="action-controls" class="controls"></div>
        </main>
    </div>

    <div id="pass-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Pass the Card</h3>
            <p>What are you declaring this card is?</p>
            <input type="text" id="declare-input" placeholder="e.g., hat, mug, box" autocomplete="off">
            
            <p>Who are you passing it to?</p>
            <select id="target-select"></select>
            
            <button id="submit-pass-btn">Pass Card</button>
            <button id="cancel-pass-btn" class="secondary">Cancel</button>
        </div>
    </div>

    <div id="chat-container" class="hidden">
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="chat-send-btn">Send</button>
        </div>
    </div>

    <div id="game-over-overlay" class="hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
